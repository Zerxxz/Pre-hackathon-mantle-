[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

# Mantle Sepolia Testnet — chainId 5003, gas token MNT.
# Set MANTLE_TESTNET_RPC + PRIVATE_KEY in contracts/.env (see .env.example).
[rpc_endpoints]
mantle_testnet = "${MANTLE_TESTNET_RPC}"

# Optional: contract verification on MantleScan (needs an API key).
[etherscan]
mantle_testnet = { key = "${MANTLESCAN_API_KEY}", url = "https://api-sepolia.mantlescan.xyz/api", chain = 5003 }

# See: https://book.getfoundry.sh/reference/config/
