[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

# Mantle testnet (Sepolia). Set MANTLE_TESTNET_RPC + PRIVATE_KEY in your env.
[rpc_endpoints]
mantle_testnet = "${MANTLE_TESTNET_RPC}"

# See: https://book.getfoundry.sh/reference/config/
