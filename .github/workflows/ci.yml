name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    name: Contracts (forge build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install forge-std
        run: git clone --depth 1 https://github.com/foundry-rs/forge-std lib/forge-std

      - name: Build
        run: forge build

      - name: Test
        run: forge test -vvv

  frontend:
    name: Frontend (next build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  services:
    name: Typecheck (${{ matrix.pkg }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pkg: [agent, harness, orchestrator]
    defaults:
      run:
        working-directory: ${{ matrix.pkg }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.pkg }}/package-lock.json
      - run: npm ci
      - run: npm run typecheck
